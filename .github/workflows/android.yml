name: Build Android Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # 核心：指定 Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 赋予 Gradle 执行权限
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 构建项目
    - name: Build with Gradle
      run: ./gradlew build
